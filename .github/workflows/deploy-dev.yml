name: Deploy Web DEV

on:
  workflow_dispatch:

concurrency:
  group: conectadoc-dev-web
  cancel-in-progress: true

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_VERSION="${PACKAGE_VERSION}+${SHORT_SHA}"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Setup Bitbucket SSH access
        env:
          BITBUCKET_SSH_KEY: ${{ secrets.BITBUCKET_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan bitbucket.org >> ~/.ssh/known_hosts
          if [ -n "${BITBUCKET_SSH_KEY:-}" ]; then
            printf '%s\n' "$BITBUCKET_SSH_KEY" | tr -d '\r' > ~/.ssh/bitbucket_deploy_key
            chmod 600 ~/.ssh/bitbucket_deploy_key
            cat > ~/.ssh/config <<'EOF'
          Host bitbucket.org
            HostName bitbucket.org
            User git
            IdentityFile ~/.ssh/bitbucket_deploy_key
            IdentitiesOnly yes
          EOF
          fi

      - name: Write production env
        env:
          WEB_ENV_FILE: ${{ secrets.WEB_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${WEB_ENV_FILE:-}" ]; then
            echo "WEB_ENV_FILE secret is required"
            exit 1
          fi
          printf '%s\n' "$WEB_ENV_FILE" > .env.production

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Write version metadata
        run: |
          set -euo pipefail
          BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > dist/version.json <<EOF
          {
            "name": "conectadoc-web",
            "version": "$APP_VERSION",
            "commit": "$GITHUB_SHA",
            "builtAt": "$BUILT_AT",
            "runId": "$GITHUB_RUN_ID"
          }
          EOF

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: conectadoc-web-dist
          path: |
            dist
            Dockerfile
            nginx.conf
            docker-compose.deploy.yml
          if-no-files-found: error

  deploy:
    name: Deploy web
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    env:
      DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_BASE_PATH: ${{ secrets.DEPLOY_BASE_PATH || '/opt/conectadoc' }}
      RELEASE_ID: ${{ github.sha }}
      RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
      DOCKER_NETWORK: conectadoc_internal
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: conectadoc-web-dist

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/conectadoc_deploy_key
          chmod 600 ~/.ssh/conectadoc_deploy_key
          for attempt in 1 2 3; do
            ssh-keyscan -T 30 -p "$DEPLOY_SSH_PORT" "$DEPLOY_SSH_HOST" && break
            sleep $((attempt * 5))
          done >> ~/.ssh/known_hosts || true

      - name: Upload release
        run: |
          set -euo pipefail
          SSH_OPTIONS=(
            -i ~/.ssh/conectadoc_deploy_key
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -p "$DEPLOY_SSH_PORT"
          )

          retry() {
            local attempt=1
            local max_attempts=5

            until "$@"; do
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "SSH command failed, retrying in $((attempt * 15))s (attempt $attempt/$max_attempts)..."
              sleep $((attempt * 15))
              attempt=$((attempt + 1))
            done
          }

          RELEASE_DIR="$DEPLOY_BASE_PATH/apps/web/releases/$RELEASE_ID"

          upload_archive() {
            tar -czf - dist Dockerfile nginx.conf docker-compose.deploy.yml | ssh "${SSH_OPTIONS[@]}" "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
              "tar -xzf - -C '$RELEASE_DIR'"
          }

          retry ssh "${SSH_OPTIONS[@]}" "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "mkdir -p '$RELEASE_DIR'"
          retry upload_archive

      - name: Run Docker Compose
        run: |
          set -euo pipefail
          SSH_OPTIONS=(
            -i ~/.ssh/conectadoc_deploy_key
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -p "$DEPLOY_SSH_PORT"
          )

          retry() {
            local attempt=1
            local max_attempts=5

            until "$@"; do
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "SSH command failed, retrying in $((attempt * 15))s (attempt $attempt/$max_attempts)..."
              sleep $((attempt * 15))
              attempt=$((attempt + 1))
            done
          }

          REMOTE_SCRIPT="$(mktemp)"
          cat > "$REMOTE_SCRIPT" <<'REMOTE'
          set -euo pipefail
          APP_DIR="$DEPLOY_BASE_PATH/apps/web"
          RELEASE_DIR="$APP_DIR/releases/$RELEASE_ID"
          LOCK_FILE="$DEPLOY_BASE_PATH/deploy.lock"
          (
            flock -w 900 9
            ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
            cd "$APP_DIR/current"
            APP_VERSION="$RELEASE_ID" DOCKER_NETWORK="$DOCKER_NETWORK" docker compose -f docker-compose.deploy.yml build
            APP_VERSION="$RELEASE_ID" DOCKER_NETWORK="$DOCKER_NETWORK" docker compose -f docker-compose.deploy.yml up -d --remove-orphans
            docker image prune -f --filter "until=168h"
            find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          ) 9>"$LOCK_FILE"
          REMOTE

          run_remote_compose() {
            ssh "${SSH_OPTIONS[@]}" "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
              "DEPLOY_BASE_PATH='$DEPLOY_BASE_PATH' RELEASE_ID='$RELEASE_ID' DOCKER_NETWORK='$DOCKER_NETWORK' bash -s" < "$REMOTE_SCRIPT"
          }

          retry run_remote_compose

      - name: Verify container
        run: |
          set -euo pipefail
          SSH_OPTIONS=(
            -i ~/.ssh/conectadoc_deploy_key
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -p "$DEPLOY_SSH_PORT"
          )

          retry() {
            local attempt=1
            local max_attempts=5

            until "$@"; do
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "SSH command failed, retrying in $((attempt * 15))s (attempt $attempt/$max_attempts)..."
              sleep $((attempt * 15))
              attempt=$((attempt + 1))
            done
          }

          check_container() {
            ssh "${SSH_OPTIONS[@]}" "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
              "for i in \$(seq 1 20); do status=\$(docker inspect --format='{{.State.Health.Status}}' conectadoc-web 2>/dev/null || true); [ \"\$status\" = healthy ] && exit 0; echo \"web health: \$status\"; sleep 3; done; docker logs --tail=80 conectadoc-web; exit 1"
          }

          retry check_container

      - name: Notify Telegram new version
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL || format('http://{0}', secrets.DEPLOY_SSH_HOST) }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_IDS:-}" ]; then
            echo "Telegram notification skipped: configure TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_IDS."
            exit 0
          fi

          MESSAGE="Nova versão do ConectaDoc Web publicada em DEV.
          Versão: $RELEASE_VERSION
          Commit: ${GITHUB_SHA::7}
          URL: $PUBLIC_URL"

          FAILED=0
          IFS=',' read -ra CHAT_IDS <<< "$TELEGRAM_CHAT_IDS"
          for RAW_CHAT_ID in "${CHAT_IDS[@]}"; do
            CHAT_ID="$(printf '%s' "$RAW_CHAT_ID" | xargs)"
            if [ -z "$CHAT_ID" ]; then
              continue
            fi

            PAYLOAD="$(CHAT_ID="$CHAT_ID" MESSAGE="$MESSAGE" node -e 'console.log(JSON.stringify({ chat_id: process.env.CHAT_ID, text: process.env.MESSAGE, disable_web_page_preview: true }))')"
            if curl --fail --show-error --silent \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              --data "$PAYLOAD" > /dev/null; then
              echo "Telegram notification sent to $CHAT_ID"
            else
              echo "::warning::Failed to send Telegram notification to $CHAT_ID"
              FAILED=1
            fi
          done

          exit "$FAILED"
